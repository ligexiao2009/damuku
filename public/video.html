<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站弹幕播放器</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-light: #e0e7ff;
      --danger: #ef4444;
      --danger-bg: #fee2e2;
      --danger-hover: #fca5a5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --font-family: 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      padding: 32px 20px;
      max-width: 1360px;
      margin: 0 auto;
    }

    .page { width: 100%; }
    .workspace { display: grid; gap: 16px; }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .app-header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }
    .app-header-title svg { color: var(--primary); }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 14px; border: none; border-radius: var(--radius-sm); font-size: 13px;
      font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--primary); color: #fff;
      box-shadow: 0 4px 14px 0 rgba(99,102,241,0.35);
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface); color: var(--text-main);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .btn-secondary:hover { background: var(--bg); border-color: #cbd5e1; }
    .btn-ghost {
      background: transparent; color: var(--text-muted); min-width: auto; padding: 6px 10px;
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text-main); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Cards */
    .card {
      background: var(--surface); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); border: 1px solid rgba(255,255,255,0.5);
      padding: 20px;
    }

    /* Status bar */
    .status-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 10px 14px; border-radius: var(--radius-md);
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .status-bar.hidden { display: none; }
    .status-item {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 999px;
      background: var(--bg); color: var(--text-muted);
      font-size: 12px; line-height: 1; min-height: 28px;
    }
    .status-item strong { color: var(--text-main); font-weight: 600; }

    /* Controls bar */
    .controls {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: stretch;
    }
    .controls > * { flex: 1 1 auto; }
    #videoFile { flex: 1 1 160px; }
    #bvidInput { flex: 1 1 140px; }

    /* Form elements */
    input, select {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      min-height: 38px; font-size: 13px; font-family: inherit;
      background: var(--bg); color: var(--text-main);
      padding: 0 12px; outline: none; transition: all 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--primary); background: var(--surface);
      box-shadow: 0 0 0 4px var(--primary-light);
    }
    select { cursor: pointer; appearance: none; -webkit-appearance: none; padding-right: 32px; }
    input[type="file"] { padding: 6px 10px; font-size: 12px; }
    input[type="file"]::file-selector-button {
      margin-right: 8px; border: none; border-radius: 6px; padding: 5px 12px;
      background: var(--primary); color: #fff; cursor: pointer; font-size: 12px; font-family: inherit;
    }

    /* Settings row */
    .settings-row {
      flex: 1 1 100%; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    }
    .settings-row.hidden { display: none; }
    .setting-group {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px 8px;
      min-height: 34px; padding: 4px 10px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1px solid var(--border);
      flex: 1 1 auto; min-width: 160px;
    }
    .setting-group label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .setting-group input[type="range"] { flex: 1 1 0; min-width: 0; padding: 0; accent-color: var(--primary); border: none; background: transparent; box-shadow: none; }
    .setting-value { font-size: 11px; color: var(--text-main); text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 36px; }

    /* Viewer grid */
    .viewer-grid {
      display: grid; grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px; align-items: stretch;
    }

    /* Player */
    .player-container {
      position: relative; width: 100%; max-width: 100%; overflow: hidden;
      background: #000; border-radius: var(--radius-lg);
      border: 1px solid var(--border); box-shadow: var(--shadow-md);
      margin: 0 auto;
    }
    .player-container:fullscreen { width: 100vw; height: 100vh; max-width: none; border-radius: 0; border: none; }
    video { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }

    #danmaku-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 999; contain: layout style paint;
    }
    .danmu {
      position: absolute; left: 0; top: 0; transform: translate3d(-9999px,-9999px,0);
      white-space: nowrap; font-weight: bold; text-shadow: 1px 1px 2px black, 0 0 2px black;
      backface-visibility: hidden; will-change: transform; contain: layout style paint;
    }

    /* Playlist panel */
    .playlist-panel {
      width: 100%; display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
      padding: 16px; min-height: 180px; overflow: hidden;
    }
    .playlist-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
    .playlist-title { font-size: 15px; font-weight: 600; color: var(--text-main); }
    .playlist-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .toggle-label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .toggle-label input[type="checkbox"] { accent-color: var(--primary); width: 15px; height: 15px; margin: 0; cursor: pointer; }

    .playlist-list {
      display: grid; gap: 8px; flex: 1; min-height: 0; overflow-y: auto;
      padding-right: 4px; align-content: start;
    }
    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list:hover::-webkit-scrollbar-thumb { background: #a1a1aa; }

    .playlist-item {
      position: relative; width: 100%; text-align: left;
      padding: 10px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-main); cursor: pointer;
      display: grid; grid-template-columns: 110px minmax(0, 1fr);
      align-items: stretch; gap: 10px;
      -webkit-appearance: none; appearance: none;
      transition: all 0.2s ease; white-space: normal;
    }
    @media (hover: hover) { .playlist-item:hover { border-color: var(--primary); background: var(--surface); } }
    .playlist-item.active { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 1px var(--primary); }

    .playlist-thumb-wrap {
      position: relative; width: 100%; min-width: 0; height: 0;
      padding-bottom: 56.25%; border-radius: 10px; overflow: hidden;
      background: var(--bg); border: 1px solid var(--border);
      transform: translateZ(0); -webkit-mask-image: -webkit-radial-gradient(white, black);
    }
    .playlist-thumb { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 10px; }
    .playlist-item-name { font-size: 13px; font-weight: 600; word-break: break-word; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .playlist-item-meta { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .playlist-item-body { display: grid; align-content: center; gap: 6px; min-width: 0; }
    .playlist-item-delete {
      position: absolute; right: 8px; top: 8px; width: 24px; height: 24px;
      border-radius: 50%; background: var(--danger-bg); color: var(--danger);
      border: none; cursor: pointer; font-size: 14px; line-height: 24px; text-align: center;
      opacity: 0; transition: opacity 0.15s; z-index: 2;
    }
    @media (hover: hover) { .playlist-item:hover .playlist-item-delete { opacity: 1; } }
    .playlist-item:focus-within .playlist-item-delete { opacity: 1; }
    .playlist-item-delete:hover { background: var(--danger-hover); }
    .playlist-item.active .playlist-thumb-wrap { border-color: var(--primary); }

    .playlist-empty {
      padding: 24px 16px; border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text-muted);
      font-size: 13px; line-height: 1.6; text-align: center;
    }
    .playlist-thumb-placeholder {
      width: 100%; height: 100%; display: grid; place-items: center;
      color: var(--text-muted); font-size: 12px;
      background: var(--bg);
    }

    .control-hint {
      padding: 0 4px; color: var(--text-muted); font-size: 12px; line-height: 1.5;
    }

    /* Toast */
    .toast-container { position: fixed; top: 16px; right: 16px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      max-width: 380px; padding: 14px 18px; border-radius: var(--radius-md);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-main); font-size: 13px; line-height: 1.5;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1); animation: toastIn 0.3s ease; pointer-events: auto;
    }
    .toast.removing { animation: toastOut 0.25s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }

    /* Responsive */
    @media (max-width: 980px) {
      .viewer-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      body { padding: 16px 12px; }
      .controls { flex-direction: column; }
      .playlist-item { grid-template-columns: 96px minmax(0, 1fr); }
      .player-container { border-radius: var(--radius-md); }
    }
  </style>
</head>

<body>
  <div class="toast-container" id="toastContainer"></div>
  <main class="page">
    <div class="app-header">
      <div class="app-header-title">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.5" ry="2.5"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
        B站弹幕播放器
      </div>
      <div class="header-actions">
        <button id="fullScreenBtn" class="btn btn-secondary">全屏播放</button>
        <button id="renamePageBtn" class="btn btn-ghost">工具</button>
        <button id="managePageBtn" class="btn btn-ghost">管理</button>
      </div>
    </div>

    <section class="workspace">

      <div class="card">
        <div class="controls">
          <input type="file" id="videoFile" accept="video/*" multiple>
          <input type="file" id="folderPicker" webkitdirectory directory multiple hidden>
          <button id="pickFolderBtn" class="btn btn-secondary">选择文件夹</button>
          <select id="sourceSelect" title="弹幕源" style="flex:0 0 100px">
            <option value="bili">B站弹幕</option>
            <option value="qq">腾讯弹幕</option>
            <option value="mango">芒果弹幕</option>
          </select>
          <input type="text" id="bvidInput" placeholder="输入BV号、ep号或VID">
          <button id="toggleSettingsBtn" class="btn btn-secondary">弹幕设置</button>
          <div class="settings-row hidden">
            <div class="setting-group">
              <label for="speedControl">弹幕速度</label>
              <input type="range" id="speedControl" min="8" max="40" value="20" step="1">
              <span class="setting-value" id="speedValue">20秒</span>
            </div>
            <div class="setting-group">
              <label for="areaControl">显示区域</label>
              <input type="range" id="areaControl" min="10" max="100" value="25" step="5">
              <span class="setting-value" id="areaValue">25%</span>
            </div>
            <div class="setting-group">
              <label for="offsetControl">弹幕偏移</label>
              <input type="range" id="offsetControl" min="-120" max="120" value="0" step="1">
              <span class="setting-value" id="offsetValue">0秒</span>
            </div>
            <select id="strategySelect" title="弹幕获取策略" style="flex:0 0 auto; min-width: 88px;">
              <option value="xml">XML</option>
              <option value="seg.so" selected>seg.so</option>
            </select>
            <button id="loadDanmu" class="btn btn-primary">加载弹幕</button>
            <button id="refreshDanmuBtn" class="btn btn-secondary">刷新弹幕</button>
            <button id="toggleStatusBtn" class="btn btn-secondary">状态栏</button>
          </div>
        </div>
      </div>

      <div class="control-hint">从 iPad 等设备访问网页，请点击"获取服务器视频"播放 Mac 同目录下的视频文件；文件自动识别 ep 号或 BV 号。</div>

      <div class="status-bar" id="statusBar">
        <div class="status-item">策略 <strong id="statusStrategy">seg.so</strong></div>
        <div class="status-item">条数 <strong id="statusCount">0</strong></div>
        <div class="status-item">缓存 <strong id="statusCache">未加载</strong></div>
        <div class="status-item">刷新 <strong id="statusRefresh">否</strong></div>
        <div class="status-item">偏移 <strong id="statusOffset">0秒</strong></div>
        <div class="status-item">视频时间 <strong id="statusVideoTime">00:00</strong></div>
        <div class="status-item">弹幕判定 <strong id="statusTriggerTime">00:00</strong></div>
        <div class="status-item">列表 <strong id="statusPlaylist">0 / 0</strong></div>
        <div class="status-item">文件 <strong id="statusFile">未选择</strong></div>
      </div>

      <div class="viewer-grid">
        <div>
          <div class="player-container" id="player">
            <video id="video" controls controlslist="nofullscreen noremoteplayback"></video>
            <div id="danmaku-layer"></div>
          </div>
        </div>
        <aside class="playlist-panel">
          <div class="playlist-header">
            <div>
              <div class="playlist-title">播放列表</div>
              <div class="playlist-meta" id="playlistMeta">未加载文件</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <label class="toggle-label">
                <input type="checkbox" id="autoplayToggle" checked>
                连播
              </label>
              <button id="prevVideoBtn" class="btn btn-secondary" style="padding:6px 12px; font-size:12px;">上一页</button>
              <button id="nextVideoBtn" class="btn btn-secondary" style="padding:6px 12px; font-size:12px;">下一页</button>
            </div>
          </div>
          <select id="folderSelect" title="服务器视频目录" style="width:100%; margin-bottom:10px; font-size:12px;"></select>
          <div class="playlist-list" id="playlist"></div>
        </aside>
      </div>

    </section>
  </main>

  
  <script>
    const video = document.getElementById('video');
    const player = document.getElementById('player');
    const videoFile = document.getElementById('videoFile');
    const folderPicker = document.getElementById('folderPicker');
    const pickFolderBtn = document.getElementById('pickFolderBtn');
    const folderSelect = document.getElementById('folderSelect');
    const loadDanmuBtn = document.getElementById('loadDanmu');
    const refreshDanmuBtn = document.getElementById('refreshDanmuBtn');
    const toggleStatusBtn = document.getElementById('toggleStatusBtn');
    const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
    const renamePageBtn = document.getElementById('renamePageBtn');
    const managePageBtn = document.getElementById('managePageBtn');
    const fullScreenBtn = document.getElementById('fullScreenBtn');
    const prevVideoBtn = document.getElementById('prevVideoBtn');
    const nextVideoBtn = document.getElementById('nextVideoBtn');
    const autoplayToggle = document.getElementById('autoplayToggle');
    const playlist = document.getElementById('playlist');
    const playlistMeta = document.getElementById('playlistMeta');
    const bvidInput = document.getElementById('bvidInput');
    const sourceSelect = document.getElementById('sourceSelect');
    const strategySelect = document.getElementById('strategySelect');
    const danmakuLayer = document.getElementById('danmaku-layer');
    const speedControl = document.getElementById('speedControl');
    const areaControl = document.getElementById('areaControl');
    const offsetControl = document.getElementById('offsetControl');
    const speedValue = document.getElementById('speedValue');
    const areaValue = document.getElementById('areaValue');
    const offsetValue = document.getElementById('offsetValue');
    const statusStrategy = document.getElementById('statusStrategy');
    const statusCount = document.getElementById('statusCount');
    const statusCache = document.getElementById('statusCache');
    const statusRefresh = document.getElementById('statusRefresh');
    const statusOffset = document.getElementById('statusOffset');
    const statusVideoTime = document.getElementById('statusVideoTime');
    const statusTriggerTime = document.getElementById('statusTriggerTime');
    const statusPlaylist = document.getElementById('statusPlaylist');
    const statusFile = document.getElementById('statusFile');
    const statusBar = document.getElementById('statusBar');
    const toastContainer = document.getElementById('toastContainer');

    function toast(msg, duration = 3000) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      toastContainer.appendChild(el);
      let timer;
      if (duration > 0) {
        timer = setTimeout(() => dismissToast(el), duration);
      }
      el.addEventListener('click', () => {
        clearTimeout(timer);
        dismissToast(el);
      });
      return el;
    }

    function dismissToast(el) {
      if (!el || el.classList.contains('removing')) return;
      el.classList.add('removing');
      el.addEventListener('animationend', () => el.remove());
    }

    const playbackMemoryKey = 'b-video-playback-memory';
    const danmuSettingsKey = 'b-video-danmu-settings';
    const statusBarVisibleKey = 'b-video-status-bar-visible';
    const progressSaveInterval = 5000;

    const placeholderThumb = createThumbPlaceholder('暂无缩略图');
    const placeholderLocalThumb = createThumbPlaceholder('本地文件');

    let danmus = [];
    let danmuIndex = 0;
    let danmuDuration = Number(speedControl.value);
    let danmuAreaRatio = Number(areaControl.value) / 100;
    let danmuOffset = Number(offsetControl.value);

    let currentVideoDir = '';
    let currentVideoMemoryId = '';
    let pendingResumeTime = 0;
    let currentVideoName = '未选择';
    let currentPlaylist = [];
    let currentPlaylistIndex = -1;
    let currentObjectUrl = '';
    const PAGE_SIZE = 5;

    let layerW = 0;
    let layerH = 0;
    const danmuPool = [];
    const danmuMeasureCanvas = document.createElement('canvas');
    const danmuMeasureContext = danmuMeasureCanvas.getContext('2d');
    const danmuWidthCache = new Map();

    let laneAvailableAt = [];
    const laneGap = 24;
    let danmuLoopId = 0;
    const maxDanmuPerFrame = 6;
    const videoFilePattern = /\.(mp4|mkv|avi|mov|m4v|webm)$/i;

    let lastVideoTime = 0;
    let lastPerfTime = 0;
    let lastProgressSave = 0;

    async function api(url, options) {
      const res = await fetch(url, options);
      const json = await res.json();
      if (json.code !== 0) throw new Error(json.message || '请求失败');
      return json.data;
    }

    function createThumbPlaceholder(label) {
      const safe = String(label || '暂无缩略图')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="480" height="270" viewBox="0 0 480 270">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#20293a"/>
              <stop offset="100%" stop-color="#0c1017"/>
            </linearGradient>
          </defs>
          <rect width="480" height="270" fill="url(#g)"/>
          <rect x="18" y="18" width="444" height="234" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
          <text x="50%" y="46%" text-anchor="middle" fill="#f6f7fb" font-size="28" font-family="PingFang SC, Microsoft YaHei, sans-serif">${safe}</text>
          <text x="50%" y="60%" text-anchor="middle" fill="#a8b0c2" font-size="16" font-family="PingFang SC, Microsoft YaHei, sans-serif">B站弹幕播放器</text>
        </svg>
      `.trim();

      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function safeDisplayName(name) {
      try {
        return decodeURIComponent(String(name || ''));
      } catch {
        return String(name || '');
      }
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function readPlaybackMemory() {
      try {
        return JSON.parse(localStorage.getItem(playbackMemoryKey) || '{}');
      } catch {
        return {};
      }
    }

    function writePlaybackMemory(memory) {
      localStorage.setItem(playbackMemoryKey, JSON.stringify(memory));
    }

    function readDanmuSettings() {
      try {
        return JSON.parse(localStorage.getItem(danmuSettingsKey) || '{}');
      } catch {
        return {};
      }
    }

    function writeDanmuSettings(settings) {
      localStorage.setItem(danmuSettingsKey, JSON.stringify(settings));
    }

    function readStatusBarVisible() {
      const saved = localStorage.getItem(statusBarVisibleKey);
      return saved == null ? true : saved === '1';
    }

    function setStatusBarVisible(visible) {
      statusBar.classList.toggle('hidden', !visible);
      toggleStatusBtn.textContent = visible ? '隐藏状态' : '显示状态';
      localStorage.setItem(statusBarVisibleKey, visible ? '1' : '0');
    }

    function formatClock(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return '00:00';
      const totalSeconds = Math.floor(seconds);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;
      if (hours > 0) {
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }
      return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function formatDanmuTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return '00:00.0';
      const safeSeconds = Math.max(0, seconds);
      const base = formatClock(safeSeconds);
      const tenth = Math.floor((safeSeconds % 1) * 10);
      return `${base}.${tenth}`;
    }

    function formatSendTime(ctime) {
      if (!ctime || ctime <= 0) return '';
      const d = new Date(ctime * 1000);
      const MM = String(d.getMonth() + 1).padStart(2, '0');
      const DD = String(d.getDate()).padStart(2, '0');
      const HH = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      const YY = String(d.getFullYear()).slice(-2);
      return `${YY}-${MM}-${DD} ${HH}:${mm}`;
    }

    function getDanmuDisplayText(danmu) {
      if (statusBar.classList.contains('hidden')) return danmu.text;
      const sendInfo = danmu.ctime ? ` | ${formatSendTime(danmu.ctime)}` : '';
      return `[${formatDanmuTime(danmu.time)}${sendInfo}] ${danmu.text}`;
    }

    function updatePlaybackStatus(currentTime = video.currentTime) {
      const safeCurrentTime = Number.isFinite(currentTime) ? Math.max(0, currentTime) : 0;
      const triggerTime = Math.max(0, safeCurrentTime + danmuOffset);
      statusVideoTime.textContent = formatClock(safeCurrentTime);
      statusTriggerTime.textContent = formatClock(triggerTime);
    }

    function applySavedDanmuSettings() {
      const settings = readDanmuSettings();
      if (Number.isFinite(Number(settings.speed))) speedControl.value = String(settings.speed);
      if (Number.isFinite(Number(settings.area))) areaControl.value = String(settings.area);
      if (Number.isFinite(Number(settings.offset))) offsetControl.value = String(settings.offset);
    }

    function buildVideoMemoryId(file) {
      const relativeName = file.webkitRelativePath || file.name;
      return [relativeName, file.size, file.lastModified].join('__');
    }

    function isVideoFile(file) {
      return Boolean(file && videoFilePattern.test(file.name || ''));
    }

    function naturalSortValues(values) {
      return [...values].sort((a, b) => {
        const pathA = typeof a === 'string' ? a : (a.relativePath || a.webkitRelativePath || a.name || '');
        const pathB = typeof b === 'string' ? b : (b.relativePath || b.webkitRelativePath || b.name || '');
        return pathA.localeCompare(pathB, 'zh-Hans-CN', { numeric: true, sensitivity: 'base' });
      });
    }

    function getPlaylistLabel(item) {
      return safeDisplayName(item.relativePath || item.file.name);
    }

    function getThumbnailUrl(item) {
      if (item.thumbnailUrl) return item.thumbnailUrl;
      if (item.isRemote) {
        return `/api/thumbnail?name=${encodeURIComponent(item.relativePath || item.file.name)}`;
      }
      return item.videoId ? placeholderThumb : placeholderLocalThumb;
    }

    function formatFileSize(size) {
      if (!Number.isFinite(size) || size <= 0) return '--';
      const units = ['B', 'KB', 'MB', 'GB'];
      let value = size;
      let unitIndex = 0;
      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex++;
      }
      return `${value.toFixed(value >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    function detectVideoIdFromName(name) {
      if (!name) return '';
      const baseName = String(name).replace(/\.[^.]+$/, '');
      const bvidMatch = baseName.match(/BV[0-9A-Za-z]+/i);
      if (bvidMatch) return bvidMatch[0];
      const explicitEpMatch = baseName.match(/(?:^|[_\s-])(ep\d{4,})(?=$|[_\s-])/i);
      if (explicitEpMatch) return explicitEpMatch[1];
      return '';
    }

    function detectVidFromName(name) {
      if (!name) return '';
      const baseName = String(name).replace(/\.[^.]+$/, '');
      const vidMatch = baseName.match(/(?:^|[_\s-])([a-z][a-z0-9]{9,11})(?=$|[_\s-.])/i);
      return vidMatch ? vidMatch[1] : '';
    }

    function getVideoIdForSource(name, source) {
      if (source === 'qq') return detectVidFromName(name);
      return detectVideoIdFromName(name);
    }

    async function getPlaybackProgress(id) {
      if (!id) return 0;
      try {
        const data = await api(`/api/progress?id=${encodeURIComponent(id)}`);
        return Number(data.time || 0);
      } catch (err) {
        console.error('获取播放记录失败:', err);
        return 0;
      }
    }

    async function savePlaybackProgress(force = false) {
      const now = Date.now();
      if (!force && now - lastProgressSave < progressSaveInterval) return;
      lastProgressSave = now;

      if (!currentVideoMemoryId || !video.duration || !Number.isFinite(video.currentTime)) return;

      let currentTime = video.currentTime;
      if (force) {
        currentTime = Math.min(currentTime, Math.max(0, video.duration - 1));
      }

      if (video.ended || currentTime >= video.duration - 1) {
        currentTime = 0;
      }

      try {
        await fetch('/api/progress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id: currentVideoMemoryId,
            time: Number(currentTime.toFixed(2))
          })
        });
      } catch (err) {
        console.error('保存播放记录失败:', err);
      }
    }

    function updateStatusBar({ count, fromCache, forceRefresh, fileName } = {}) {
      statusStrategy.textContent = sourceSelect.value === 'bili' ? strategySelect.value : { bili: 'B站', qq: '腾讯', mango: '芒果' }[sourceSelect.value] || sourceSelect.value;
      statusCount.textContent = String(count ?? danmus.length ?? 0);
      statusCache.textContent = fromCache == null ? '未加载' : (fromCache ? '命中' : '重拉');
      statusRefresh.textContent = forceRefresh ? '是' : '否';
      statusOffset.textContent = `${danmuOffset > 0 ? '+' : ''}${danmuOffset}秒`;
      const cPage = getCurrentPage();
      const cTotal = Math.ceil(currentPlaylist.length / PAGE_SIZE);
      statusPlaylist.textContent = currentPlaylist.length ? `${currentPlaylistIndex + 1}/${currentPlaylist.length} p${cPage + 1}/${cTotal}` : '0 / 0';
      updatePlaybackStatus();

      if (fileName) currentVideoName = fileName;
      statusFile.textContent = safeDisplayName(currentVideoName);
    }

    function getCurrentPage() {
      return currentPlaylistIndex < 0 ? 0 : Math.floor(currentPlaylistIndex / PAGE_SIZE);
    }

    function updatePlaylistControls() {
      const page = getCurrentPage();
      const totalPages = Math.max(1, Math.ceil(currentPlaylist.length / PAGE_SIZE));
      prevVideoBtn.disabled = page <= 0;
      nextVideoBtn.disabled = page >= totalPages - 1;
    }

    function getVideoErrorMessage() {
      const mediaError = video.error;
      if (!mediaError) return '当前文件无法播放，可能是浏览器不支持该视频格式或编码。';
      if (mediaError.code === MediaError.MEDIA_ERR_ABORTED) return '视频加载已取消。';
      if (mediaError.code === MediaError.MEDIA_ERR_NETWORK) return '视频加载失败，可能是网络读取中断。';
      if (mediaError.code === MediaError.MEDIA_ERR_DECODE) return '视频解码失败，通常是浏览器不支持这个文件里的编码。';
      if (mediaError.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) return '浏览器不支持这个视频文件。容器或其中的编码可能不兼容。';
      return '当前文件无法播放，可能是浏览器不支持该视频格式或编码。';
    }

    function measureDanmuWidth(text, fontSize) {
      const cacheKey = `${fontSize}:${text}`;
      if (danmuWidthCache.has(cacheKey)) return danmuWidthCache.get(cacheKey);
      danmuMeasureContext.font = `bold ${fontSize}px "PingFang SC", "Microsoft YaHei", sans-serif`;
      const width = Math.ceil(danmuMeasureContext.measureText(text).width);
      danmuWidthCache.set(cacheKey, width);
      return width;
    }

    function getDanmuDom() {
      if (danmuPool.length > 0) return danmuPool.pop();
      const el = document.createElement('div');
      el.className = 'danmu';
      danmakuLayer.appendChild(el);
      return el;
    }

    function clearDanmu() {
      danmakuLayer.innerHTML = '';
      danmuPool.length = 0;
      laneAvailableAt = [];
    }

    function sendDanmu(danmu) {
      if (!layerW || !layerH) return false;

      const fontSize = 24;
      const displayText = getDanmuDisplayText(danmu);
      const danmuWidth = measureDanmuWidth(displayText, fontSize);

      const availableHeight = Math.max(fontSize, layerH * danmuAreaRatio);
      const laneHeight = fontSize + 8;
      const laneCount = Math.max(1, Math.floor(availableHeight / laneHeight));

      if (laneAvailableAt.length !== laneCount) laneAvailableAt = Array(laneCount).fill(0);

      const now = performance.now();
      let earliestLaneIndex = 0;
      let earliestTime = laneAvailableAt[0] || 0;

      for (let i = 0; i < laneAvailableAt.length; i++) {
        if ((laneAvailableAt[i] || 0) <= now) {
          earliestLaneIndex = i;
          break;
        }
        if ((laneAvailableAt[i] || 0) < earliestTime) {
          earliestTime = laneAvailableAt[i];
          earliestLaneIndex = i;
        }
      }

      if ((laneAvailableAt[earliestLaneIndex] || 0) > now) return false;

      const el = getDanmuDom();
      el.textContent = displayText;
      el.style.color = danmu.color || '#ffffff';
      el.style.fontSize = `${fontSize}px`;

      const y = earliestLaneIndex * laneHeight;
      const travelDistance = layerW + danmuWidth;
      const speedPxPerSecond = travelDistance / danmuDuration;
      const waitSeconds = (danmuWidth + laneGap) / speedPxPerSecond;
      laneAvailableAt[earliestLaneIndex] = now + waitSeconds * 1000;

      const animation = el.animate([
        { transform: `translate3d(${layerW}px, ${y}px, 0)` },
        { transform: `translate3d(-${danmuWidth}px, ${y}px, 0)` }
      ], { duration: danmuDuration * 1000, easing: 'linear' });

      animation.onfinish = () => danmuPool.push(el);
      return true;
    }

    function flushDanmuQueue(currentTime) {
      let emittedCount = 0;
      const triggerTime = currentTime + danmuOffset;

      while (danmuIndex < danmus.length && danmus[danmuIndex].time <= triggerTime) {
        if (emittedCount >= maxDanmuPerFrame) {
          danmuIndex++;
          continue;
        }
        if (sendDanmu(danmus[danmuIndex])) emittedCount++;
        danmuIndex++;
      }
    }

    function stopDanmuLoop() {
      if (danmuLoopId) {
        cancelAnimationFrame(danmuLoopId);
        danmuLoopId = 0;
      }
    }

    function startDanmuLoop() {
      stopDanmuLoop();
      lastVideoTime = video.currentTime;
      lastPerfTime = performance.now();

      const tick = (now) => {
        if (video.paused || video.ended) {
          danmuLoopId = 0;
          return;
        }

        let interpolatedTime = video.currentTime;
        if (video.currentTime !== lastVideoTime) {
          lastVideoTime = video.currentTime;
          lastPerfTime = now;
        } else {
          interpolatedTime = lastVideoTime + (now - lastPerfTime) / 1000;
        }

        flushDanmuQueue(interpolatedTime);
        updatePlaybackStatus(interpolatedTime);
        danmuLoopId = requestAnimationFrame(tick);
      };

      danmuLoopId = requestAnimationFrame(tick);
    }

    function removePlaylistItem(index) {
      const removing = currentPlaylist[index];
      currentPlaylist.splice(index, 1);

      if (currentPlaylist.length === 0) {
        currentPlaylistIndex = -1;
        currentVideoMemoryId = '';
      } else if (index === currentPlaylistIndex) {
        currentPlaylistIndex = Math.min(index, currentPlaylist.length - 1);
        playFileAtIndex(currentPlaylistIndex);
      } else if (index < currentPlaylistIndex) {
        currentPlaylistIndex--;
      }

      renderPlaylist();
      if (removing && removing.file && removing.isRemote === false && currentObjectUrl) {
        const stillUsed = currentPlaylist.some(
          p => p.isRemote === false && p.file === removing.file
        );
        if (!stillUsed) {
          URL.revokeObjectURL(currentObjectUrl);
          currentObjectUrl = null;
        }
      }
    }

    function renderPlaylist() {
      playlist.innerHTML = '';

      if (!currentPlaylist.length) {
        const empty = document.createElement('div');
        empty.className = 'playlist-empty';
        empty.textContent = '选择本地视频，或点击【获取服务器视频】后，这里会自动生成播放列表。';
        playlist.appendChild(empty);
        playlistMeta.textContent = '未加载文件';
        updatePlaylistControls();
        updateStatusBar();
        return;
      }

      const page = getCurrentPage();
      const totalPages = Math.ceil(currentPlaylist.length / PAGE_SIZE);
      const start = page * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, currentPlaylist.length);
      playlistMeta.textContent = `共 ${currentPlaylist.length} 个 · 第 ${page + 1}/${totalPages} 页`;

      for (let index = start; index < end; index++) {
        const item = currentPlaylist[index];
        
        // 修复 Safari 的 Bug: 把外层包裹由 button 换成了 div
        const button = document.createElement('div');
        button.role = 'button'; // 依然保留无障碍属性
        button.tabIndex = 0;    // 允许通过键盘选中
        button.className = `playlist-item${index === currentPlaylistIndex ? ' active' : ''}`;

        const thumbWrap = document.createElement('div');
        thumbWrap.className = 'playlist-thumb-wrap';

        const img = document.createElement('img');
        img.className = 'playlist-thumb';
        img.loading = 'lazy';
        img.alt = getPlaylistLabel(item);
        img.src = getThumbnailUrl(item);
        img.onerror = () => {
          img.onerror = null;
          img.src = item.isRemote ? placeholderThumb : placeholderLocalThumb;
        };

        thumbWrap.appendChild(img);

        const body = document.createElement('div');
        body.className = 'playlist-item-body';

        const name = document.createElement('div');
        name.className = 'playlist-item-name';
        name.textContent = getPlaylistLabel(item);

        const meta = document.createElement('div');
        meta.className = 'playlist-item-meta';
        meta.textContent = `${item.isRemote ? '' : formatFileSize(item.file.size)}${item.videoId ? ` · ${item.videoId}` : ''}`;

        body.appendChild(name);
        body.appendChild(meta);

        const delBtn = document.createElement('button');
        delBtn.className = 'playlist-item-delete';
        delBtn.textContent = '×';
        delBtn.title = '从列表移除';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          removePlaylistItem(index);
        });

        button.appendChild(thumbWrap);
        button.appendChild(body);
        button.appendChild(delBtn);
        
        // 添加键盘确认支持以完美模拟 button
        button.addEventListener('click', () => playFileAtIndex(index));
        button.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            playFileAtIndex(index);
          }
        });

        playlist.appendChild(button);
      }

      updatePlaylistControls();
      updateStatusBar();

      requestAnimationFrame(() => {
        const activeItem = playlist.querySelector('.playlist-item.active');
        if (activeItem) {
          activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      });
    }

    function updateDanmuSettings() {
      danmuDuration = Number(speedControl.value);
      danmuAreaRatio = Number(areaControl.value) / 100;
      danmuOffset = Number(offsetControl.value);
      speedValue.textContent = `${danmuDuration}秒`;
      areaValue.textContent = `${areaControl.value}%`;
      offsetValue.textContent = `${danmuOffset > 0 ? '+' : ''}${danmuOffset}秒`;
      writeDanmuSettings({ speed: danmuDuration, area: Number(areaControl.value), offset: danmuOffset });
      laneAvailableAt = [];
      updateStatusBar();
    }

    function updatePlayerSize() {
      if (!document.fullscreenElement) {
        const containerWidth = player.parentElement.clientWidth;
        const playerTop = player.getBoundingClientRect().top;
        const availableHeight = Math.max(220, window.innerHeight - playerTop - 24);
        const ratio = video.videoWidth && video.videoHeight ? video.videoWidth / video.videoHeight : 16 / 9;

        let width = containerWidth;
        let height = width / ratio;

        if (height > availableHeight) {
          height = availableHeight;
          width = height * ratio;
        }

        const finalHeight = Math.max(180, height);
        player.style.width = `${Math.max(220, Math.min(width, containerWidth))}px`;
        player.style.height = `${finalHeight}px`;

        const playlistPanel = document.querySelector('.playlist-panel');
        if (window.innerWidth > 980) {
          playlistPanel.style.height = `${finalHeight}px`;
        } else {
          playlistPanel.style.height = '400px'; 
        }
      }

      requestAnimationFrame(() => {
        layerW = danmakuLayer.clientWidth;
        layerH = danmakuLayer.clientHeight;
      });
    }

    function loadFilesIntoPlaylist(files, preferredFileName = '') {
      const videoFiles = naturalSortValues(files).filter(isVideoFile);
      if (!videoFiles.length) {
        toast('没有找到可播放的视频文件');
        return;
      }

      const normalizedPreferred = preferredFileName || videoFiles[0].name;
      currentPlaylist = videoFiles.map(file => ({
        file,
        relativePath: file.webkitRelativePath || file.name,
        videoId: detectVideoIdFromName(file.name),
        isRemote: false,
        thumbnailUrl: `/api/thumbnail?name=${encodeURIComponent(file.name)}`
      }));

      currentPlaylistIndex = -1;
      currentVideoName = '未选择';
      danmus = [];
      danmuIndex = 0;
      clearDanmu();
      renderPlaylist();

      const startIndex = currentPlaylist.findIndex(item =>
        item.file.name === normalizedPreferred || item.relativePath === normalizedPreferred
      );

      playFileAtIndex(startIndex === -1 ? 0 : startIndex);
    }

    function appendFilesToPlaylist(files) {
      const videoFiles = naturalSortValues(files).filter(isVideoFile);
      if (!videoFiles.length) {
        toast('没有找到可播放的视频文件');
        return;
      }

      const existingKeys = new Set(currentPlaylist.map(item => buildVideoMemoryId(item.file)));

      const newItems = videoFiles
        .filter(file => !existingKeys.has(buildVideoMemoryId(file)))
        .map(file => ({
          file,
          relativePath: file.webkitRelativePath || file.name,
          videoId: detectVideoIdFromName(file.name),
          isRemote: false,
          thumbnailUrl: `/api/thumbnail?name=${encodeURIComponent(file.name)}`
        }));

      if (!newItems.length) {
        toast('这些文件已经在播放列表里了');
        return;
      }

      const firstNewIndex = currentPlaylist.length;
      currentPlaylist = [...currentPlaylist, ...newItems];
      renderPlaylist();
      playFileAtIndex(firstNewIndex);
    }

    async function applyDanmuForVideoId(videoId, { showAlert = true, forceRefresh = false } = {}) {
      if (!videoId) {
        if (showAlert) toast('请输入BV号、ep号或VID');
        return false;
      }

      const source = sourceSelect.value;
      const sourceLabel = { bili: 'B站', qq: '腾讯', mango: '芒果' }[source] || source;
      const loadingToast = toast(`正在加载${sourceLabel}弹幕...`, 0);

      if (source === 'bili') {
        const progressTimer = setInterval(async () => {
          try {
            const p = await api(`/api/danmu/progress?id=${encodeURIComponent(videoId)}`);
            if (p) {
              const phase = p.phase === 'retrying' ? '重试' : '加载';
              loadingToast.textContent = `正在${phase}弹幕... ${p.current}/${p.total}`;
            }
          } catch {}
        }, 800);

        try {
          const params = new URLSearchParams({ source, id: videoId, strategy: strategySelect.value });
          if (forceRefresh) params.set('refresh', '1');
          const data = await api(`/api/danmaku?${params.toString()}`);
          danmus = data.danmus.sort((a, b) => a.time - b.time);
          danmuIndex = 0;
          clearDanmu();
          updateStatusBar({ count: data.count, fromCache: data.fromCache, forceRefresh });
          clearInterval(progressTimer);
          dismissToast(loadingToast);
          if (showAlert) toast(`已加载 ${danmus.length} 条弹幕`);
          return true;
        } catch (error) {
          danmus = []; danmuIndex = 0; clearDanmu();
          updateStatusBar({ count: 0, fromCache: false, forceRefresh });
          clearInterval(progressTimer);
          dismissToast(loadingToast);
          if (showAlert) toast(error.message || '弹幕加载失败');
          return false;
        }
      } else {
        try {
          const durMs = video.duration ? Math.round(video.duration * 1000) : 3600000;
          const params = new URLSearchParams({ source, id: videoId, duration: String(durMs) });
          if (forceRefresh) params.set('refresh', '1');
          const data = await api(`/api/danmaku?${params.toString()}`);
          danmus = data.danmus.sort((a, b) => a.time - b.time);
          danmuIndex = 0;
          clearDanmu();
          updateStatusBar({ count: data.count, fromCache: data.fromCache, forceRefresh });
          dismissToast(loadingToast);
          if (showAlert) toast(`已加载 ${danmus.length} 条弹幕`);
          return true;
        } catch (error) {
          danmus = []; danmuIndex = 0; clearDanmu();
          updateStatusBar({ count: 0, fromCache: false, forceRefresh });
          dismissToast(loadingToast);
          if (showAlert) toast(error.message || '弹幕加载失败');
          return false;
        }
      }
    }

    async function playFileAtIndex(index, { forceRefreshDanmu = false } = {}) {
      const item = currentPlaylist[index];
      if (!item) return false;

      await savePlaybackProgress(true);
      stopDanmuLoop();
      clearDanmu();
      danmus = [];
      danmuIndex = 0;

      currentPlaylistIndex = index;
      if (item.isRemote && currentVideoDir) await saveFolderHistory(currentVideoDir, item.relativePath || item.file.name);
      currentVideoName = getPlaylistLabel(item);
      currentVideoMemoryId = buildVideoMemoryId(item.file);
      pendingResumeTime = await getPlaybackProgress(currentVideoMemoryId);

      renderPlaylist();
      updateStatusBar({ fileName: currentVideoName, count: 0, fromCache: null, forceRefresh: false });

      if (currentObjectUrl) {
        URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = '';
      }

      if (item.isRemote) {
        video.src = `/stream?name=${encodeURIComponent(item.relativePath || item.file.name)}`;
      } else {
        currentObjectUrl = URL.createObjectURL(item.file);
        video.src = currentObjectUrl;
      }

      video.addEventListener('canplay', () => {
        video.play().catch(() => {});
      }, { once: true });

      updatePlayerSize();

      const name = item.file.name;
      const biliId = detectVideoIdFromName(name);
      const tencentId = detectVidFromName(name);
      let autoVideoId;
      if (tencentId && !biliId) {
        sourceSelect.value = 'qq';
        autoVideoId = tencentId;
      } else if (biliId) {
        sourceSelect.value = 'bili';
        autoVideoId = biliId;
      } else {
        autoVideoId = item.videoId || biliId || tencentId || '';
      }
      sourceSelect.dispatchEvent(new Event('change'));
      bvidInput.value = autoVideoId;
      if (autoVideoId) {
        await applyDanmuForVideoId(autoVideoId, { showAlert: false, forceRefresh: forceRefreshDanmu });
      } else {
        updateStatusBar({ count: 0, fromCache: null, forceRefresh: false, fileName: currentVideoName });
      }

      updateStatusBar({ fileName: currentVideoName });
      return true;
    }

    async function readFolderHistory() {
      try {
        return await api('/api/folder-history') || {};
      } catch { return {}; }
    }

    async function saveFolderHistory(dir, name) {
      try {
        await fetch('/api/folder-history', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ dir, name })
        });
      } catch {}
    }

    async function loadServerVideos() {
      try {
        const fileNames = await api('/api/videos');

        if (!fileNames || fileNames.length === 0) {
          return toast('服务器当前目录下没有找到视频文件！');
        }

        currentPlaylist = naturalSortValues(fileNames).map(name => ({
          file: { name, size: 0, lastModified: 0 },
          relativePath: name,
          videoId: detectVideoIdFromName(name),
          isRemote: true,
          thumbnailUrl: `/api/thumbnail?name=${encodeURIComponent(name)}`
        }));

        currentPlaylistIndex = -1;
        currentVideoName = '未选择';
        danmus = [];
        danmuIndex = 0;
        clearDanmu();
        renderPlaylist();

        const history = await readFolderHistory();
        const savedName = history[currentVideoDir];
        const foundIndex = savedName ? currentPlaylist.findIndex(item => (item.relativePath || item.file.name) === savedName) : -1;
        const startIndex = foundIndex >= 0 ? foundIndex : 0;
        playFileAtIndex(startIndex);
      } catch (err) {
        console.error('获取服务器视频列表失败:', err);
        toast('获取服务器视频列表失败，请检查 Node.js 服务是否正常启动。');
      }
    }

    async function loadFolders() {
      try {
        const folders = await api('/api/folders');
        folderSelect.innerHTML = '';
        if (!folders || folders.length === 0) {
          folderSelect.innerHTML = '<option value="">-- 无可用目录 --</option>';
          return;
        }
        folders.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.path;
          opt.textContent = f.name;
          folderSelect.appendChild(opt);
        });
      } catch (err) {
        console.error('获取文件夹列表失败:', err);
        folderSelect.innerHTML = '<option value="">-- 加载失败 --</option>';
      }
    }

    folderSelect.addEventListener('change', async () => {
      const dir = folderSelect.value;
      if (!dir) return;
      try {
        await api('/api/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videoDir: dir })
        });
        currentVideoDir = dir;
        await loadServerVideos();
      } catch (err) {
        console.error('切换目录失败:', err);
        toast(err.message || '切换目录失败');
      }
    });

    loadFolders();

    videoFile.addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      if (files.length) appendFilesToPlaylist(files);
      e.target.value = '';
      folderPicker.value = '';
    });

    pickFolderBtn.addEventListener('click', () => folderPicker.click());

    folderPicker.addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      if (files.length) loadFilesIntoPlaylist(files, files.find(isVideoFile)?.webkitRelativePath || files[0].name);
      e.target.value = '';
      videoFile.value = '';
    });

    video.addEventListener('loadedmetadata', () => {
      updatePlayerSize();
      updatePlaybackStatus();
      if (pendingResumeTime > 0) {
        video.currentTime = Math.min(pendingResumeTime, Math.max(0, video.duration - 1));
        pendingResumeTime = 0;
      }
    });

    video.addEventListener('error', () => {
      stopDanmuLoop();
      const item = currentPlaylist[currentPlaylistIndex];
      const fileName = item ? getPlaylistLabel(item) : currentVideoName;
      updateStatusBar({ count: 0, fromCache: null, forceRefresh: false, fileName });
      toast(`${fileName} 无法播放。\n\n${getVideoErrorMessage()}\n\n请尝试在 Safari 中播放或将视频转码为 H.264 MP4 格式。`, 6000);
    });

    video.addEventListener('play', startDanmuLoop);
    video.addEventListener('pause', () => {
      stopDanmuLoop();
      savePlaybackProgress(true);
    });
    video.addEventListener('ended', () => {
      stopDanmuLoop();
      savePlaybackProgress(true);
      updatePlaybackStatus();
      if (autoplayToggle.checked && currentPlaylistIndex >= 0 && currentPlaylistIndex < currentPlaylist.length - 1) {
        playFileAtIndex(currentPlaylistIndex + 1);
      }
    });
    video.addEventListener('timeupdate', () => {
      savePlaybackProgress();
      updatePlaybackStatus();
    });

    video.addEventListener('seeked', () => {
      danmuIndex = danmus.findIndex(d => d.time >= video.currentTime);
      if (danmuIndex === -1) danmuIndex = danmus.length;
      clearDanmu();
      lastVideoTime = video.currentTime;
      lastPerfTime = performance.now();
      updatePlaybackStatus();
      if (!video.paused) startDanmuLoop();
    });

    loadDanmuBtn.addEventListener('click', () => applyDanmuForVideoId(bvidInput.value.trim()));
    refreshDanmuBtn.addEventListener('click', () => applyDanmuForVideoId(bvidInput.value.trim(), { forceRefresh: true }));

    sourceSelect.addEventListener('change', () => {
      const src = sourceSelect.value;
      const isBili = src === 'bili';
      strategySelect.style.display = isBili ? '' : 'none';
      bvidInput.placeholder = isBili ? '输入BV号、ep号' : src === 'qq' ? '输入VID' : '输入HHMMSS/videoId';
      if (currentVideoName && currentVideoName !== '未选择') {
        bvidInput.value = getVideoIdForSource(currentVideoName, src);
      }
      updateStatusBar();
    });

    prevVideoBtn.addEventListener('click', () => {
      const page = getCurrentPage();
      if (page > 0) playFileAtIndex((page - 1) * PAGE_SIZE);
    });

    nextVideoBtn.addEventListener('click', () => {
      const page = getCurrentPage();
      const totalPages = Math.ceil(currentPlaylist.length / PAGE_SIZE);
      if (page < totalPages - 1) playFileAtIndex((page + 1) * PAGE_SIZE);
    });

    toggleStatusBtn.addEventListener('click', () => setStatusBarVisible(statusBar.classList.contains('hidden')));

    toggleSettingsBtn.addEventListener('click', () => {
      const row = document.querySelector('.settings-row');
      row.classList.toggle('hidden');
    });

    renamePageBtn.addEventListener('click', () => {
      window.open('/rename.html', '_blank');
    });

    managePageBtn.addEventListener('click', () => {
      window.open('/manage.html', '_blank');
    });

    fullScreenBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        player.requestFullscreen().catch(err => toast(`全屏失败: ${err.message}`));
      } else {
        document.exitFullscreen().catch(() => {});
      }
    });

    player.addEventListener('dblclick', () => {
      if (!document.fullscreenElement) player.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
    });

    player.addEventListener('click', event => {
      if (event.target !== video && event.target !== danmakuLayer && !video.contains(event.target)) return;
      if (!video.src) return;

      const controlsHeight = 48;
      const rect = video.getBoundingClientRect();
      const clickFromBottom = rect.bottom - event.clientY;
      if (clickFromBottom <= controlsHeight) return;

      if (video.paused) video.play().catch(() => {});
      else video.pause();
    });

    speedControl.addEventListener('input', updateDanmuSettings);
    areaControl.addEventListener('input', updateDanmuSettings);
    offsetControl.addEventListener('input', updateDanmuSettings);

    window.addEventListener('resize', updatePlayerSize);
    document.addEventListener('fullscreenchange', updatePlayerSize);

    window.addEventListener('beforeunload', () => {
      savePlaybackProgress(true);
      if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
    });

    applySavedDanmuSettings();
    updateDanmuSettings();
    updatePlayerSize();
    updateStatusBar();
    setStatusBarVisible(readStatusBarVisible());
    renderPlaylist();
  </script>

</body>

</html>
