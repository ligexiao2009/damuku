<!DOCTYPE html>
<html lang="zh-CN" translate="no" class="notranslate">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频管理</title>
  <style>
    :root {
      /* 现代配色变量 */
      --primary: #6366f1; /* 靛蓝色 */
      --primary-hover: #4f46e5;
      --primary-light: #e0e7ff;
      --danger: #ef4444;
      --danger-bg: #fee2e2;
      --danger-hover: #fca5a5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --font-family: 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      padding: 40px 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* 顶部头部 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title svg {
      width: 28px;
      height: 28px;
      color: var(--primary);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .home-btn:hover {
      background: var(--bg);
      border-color: #cbd5e1;
    }

    /* 卡片布局 */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 28px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* 表单元素 */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    select, input[type=number] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-main);
      background: var(--bg);
      transition: all 0.2s ease;
      font-family: inherit;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      padding-right: 40px;
      cursor: pointer;
    }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-muted);
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    /* 数据表格区域 */
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 12px;
    }

    .video-count {
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .table-container {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--surface);
    }

    .table-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px 110px 55px 55px;
      gap: 16px;
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sortable {
      cursor: pointer; user-select: none; transition: color 0.15s;
    }
    .sortable:hover { color: var(--primary); }
    .sortable.sorted { color: var(--primary); }
    .sort-arrow { font-size: 10px; }

    .table-body {
      max-height: 400px;
      overflow-y: auto;
    }

    .table-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px 110px 55px 55px;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: #f8fafc; }

    .col-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-name svg { flex-shrink: 0; color: var(--text-muted); }
    .col-size, .col-date { font-size: 13px; color: var(--text-muted); }
    .col-date.remain-ok { color: #16a34a; font-weight: 600; }
    .col-date.remain-warn { color: #d97706; font-weight: 600; }
    .col-date.remain-today { color: #ea580c; font-weight: 600; }
    .col-date.remain-expired { color: #dc2626; font-weight: 600; }
    
    /* 按钮 */
    .btn-danger {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--danger);
      background: var(--danger-bg);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
      justify-self: end;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      color: #991b1b;
    }
    .retention-btn {
      padding: 5px 8px; font-size: 11px; font-weight: 500;
      color: var(--primary); background: var(--primary-light);
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.2s; justify-self: end;
    }
    .retention-btn:hover { background: #c7d2fe; color: #3730a3; }
    .retention-btn.has-rule { background: #fef3c7; color: #92400e; }
    .retention-btn.has-rule:hover { background: #fde68a; }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
      margin-top: 8px;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* 策略列表 */
    .policy-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .policy-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: box-shadow 0.2s;
    }

    .policy-item:hover {
      box-shadow: var(--shadow-md);
      border-color: #cbd5e1;
    }

    .policy-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .policy-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      word-break: break-all;
    }

    .policy-days {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* 状态提示 */
    .empty-state, .loading-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty-state svg { color: #cbd5e1; }

    /* Flex 布局辅助 */
    .row-group {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
      backdrop-filter: blur(4px);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-dialog {
      background: var(--surface); border-radius: var(--radius-lg); box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      padding: 28px; width: min(400px, 90vw); animation: slideUp 0.25s ease;
    }
    .modal-dialog h3 { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text-main); }
    .modal-dialog .modal-file { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; word-break: break-all; line-height: 1.4; }
    .modal-dialog input[type=number] { width: 100%; text-align: center; font-size: 28px; font-weight: 600; padding: 12px; letter-spacing: -0.5px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 10px; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); cursor: pointer; border: none; transition: all 0.2s; }
    .modal-btn-cancel { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); }
    .modal-btn-cancel:hover { background: #e2e8f0; }
    .modal-btn-confirm { background: var(--primary); color: #fff; }
    .modal-btn-confirm:hover { background: var(--primary-hover); }
    .modal-btn-remove { background: var(--danger-bg); color: var(--danger); font-size: 12px; padding: 6px 12px; margin-top: 8px; width: 100%; }
    .modal-btn-remove:hover { background: var(--danger-hover); }
    .modal-hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 8px; }

    @media (max-width: 768px) {
      .table-header, .table-row {
        grid-template-columns: minmax(0, 1fr) 80px 70px 48px 48px;
      }
      .col-date { display: none; }
      .retention-btn { font-size: 10px; padding: 4px 6px; }
      .row-group { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.5" ry="2.5"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
      <h1>媒体控制台</h1>
    </div>
    <button class="home-btn" onclick="location.href='/video.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      返回主页
    </button>
  </div>

  <div class="grid-container">
    
    <!-- 视频管理卡片 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">文件浏览器</div>
        <div class="card-desc">选择目录以查看和管理视频文件</div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <select id="videoFolderSelect"><option value="">加载中...</option></select>
          <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>

      <div class="table-toolbar">
        <div class="video-count" id="videoCount">0 个视频</div>
      </div>

      <div class="table-container">
        <div class="table-header" id="tableHeader">
          <span class="sortable" data-sort="name">文件名称<span class="sort-arrow"></span></span>
          <span class="sortable" data-sort="size">大小<span class="sort-arrow"></span></span>
          <span class="sortable col-date" data-sort="date">剩余<span class="sort-arrow"></span></span>
          <span style="text-align: right;">操作</span>
          <span></span>
        </div>
        <div class="table-body" id="videoTableBody">
          <div class="loading-state">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            等待选择文件夹
          </div>
        </div>
      </div>
    </div>

    <!-- 自动清理卡片 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">自动清理规则</div>
        <div class="card-desc">配置目录的保留策略，系统将自动清理超期文件。</div>
      </div>

      <div class="row-group">
        <div class="form-group">
          <label class="form-label">目标目录</label>
          <div class="input-wrapper">
            <select id="retentionFolderSelect"><option value="">加载中...</option></select>
            <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">保留天数 (0=禁用)</label>
          <input type="number" id="retentionDays" min="0" placeholder="例如: 30">
        </div>
      </div>

      <button class="btn-primary" id="saveRetentionBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        保存规则
      </button>

      <div style="margin-top: 32px;">
        <label class="form-label" style="color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;">当前生效的规则</label>
        <div class="policy-list" id="policyList">
          <div class="loading-state">加载中...</div>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="retentionModal" style="display:none;">
    <div class="modal-dialog">
      <h3>设置自动清理</h3>
      <div class="modal-file" id="modalFileName"></div>
      <input type="number" id="modalRetentionDays" min="0" placeholder="保留天数" value="30">
      <div class="modal-hint">0 = 取消清理规则</div>
      <div class="modal-actions">
        <button class="modal-btn-cancel" id="modalCancel">取消</button>
        <button class="modal-btn-confirm" id="modalConfirm">确认</button>
      </div>
      <button class="modal-btn-remove" id="modalRemove">移除已有规则</button>
    </div>
  </div>
  <script>
    // 现代版 Toast 提示
    function toast(msg, isError) {
      var el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = `
        position: fixed; bottom: 32px; right: 32px;
        background: ${isError ? '#ef4444' : '#10b981'}; color: white;
        padding: 14px 24px; border-radius: 8px; z-index: 9999;
        font-size: 14px; font-weight: 500;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        transform: translateY(100px); opacity: 0;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      `;
      document.body.appendChild(el);
      requestAnimationFrame(() => { el.style.transform = 'translateY(0)'; el.style.opacity = '1'; });
      setTimeout(() => { 
        el.style.transform = 'translateY(20px)'; el.style.opacity = '0'; 
        setTimeout(() => el.remove(), 400); 
      }, 3000);
    }

    async function api(url, options) {
      var res = await fetch(url, options);
      var json = await res.json();
      if (json.code !== 0) throw new Error(json.message || '请求失败');
      return json.data;
    }

    function formatSize(bytes) {
      if (!bytes) return '0 B';
      var u = ['B','KB','MB','GB','TB'];
      var i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
    }

    function formatDate(ms) {
      var d = new Date(ms);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    var videoFolderSelect = document.getElementById('videoFolderSelect');
    var retentionFolderSelect = document.getElementById('retentionFolderSelect');
    var populating = false;

    document.getElementById('tableHeader').addEventListener('click', function(e) {
      var s = e.target.closest('.sortable');
      if (!s) return;
      var field = s.getAttribute('data-sort');
      if (sortField === field) { sortDir = -sortDir; }
      else { sortField = field; sortDir = 1; }
      loadVideos(videoFolderSelect.value);
    });

    async function loadFolders() {
      try {
        var folders = await api('/api/folders');
        populating = true;
        var h1 = '<option value="">查看全部视频</option>';
        var h2 = '<option value="" disabled selected>请选择要配置的目录</option>';
        for (var i = 0; i < folders.length; i++) {
          var val = esc(folders[i].path), name = esc(folders[i].name);
          h1 += '<option value="' + val + '">' + name + '</option>';
          h2 += '<option value="' + val + '">' + name + '</option>';
        }
        videoFolderSelect.innerHTML = h1; retentionFolderSelect.innerHTML = h2;
        populating = false;
      } catch (err) {
        populating = false;
        videoFolderSelect.innerHTML = '<option value="">加载失败</option>';
        retentionFolderSelect.innerHTML = '<option value="">加载失败</option>';
      }
    }
    loadFolders();

    var videoTableBody = document.getElementById('videoTableBody');
    var videoCount = document.getElementById('videoCount');
    var loadVideosReq = 0;
    var sortField = 'name';
    var sortDir = 1;

    function sortFiles(files) {
      if (sortField === 'size') {
        files.sort(function(a, b) { return (a.size - b.size) * sortDir; });
      } else if (sortField === 'date') {
        files.sort(function(a, b) {
          var ra = getRule(a.path, a.folder);
          var rb = getRule(b.path, b.folder);
          var dlA = ra ? (ra.setAt || a.mtime) + ra.days * 86400000 : Infinity;
          var dlB = rb ? (rb.setAt || b.mtime) + rb.days * 86400000 : Infinity;
          return (dlA - dlB) * sortDir;
        });
      } else {
        files.sort(function(a, b) { return a.name.localeCompare(b.name, 'zh-Hans-CN', { numeric: true, sensitivity: 'base' }) * sortDir; });
      }
    }

    function updateSortHeaders() {
      var headers = document.querySelectorAll('.sortable');
      for (var i = 0; i < headers.length; i++) {
        var h = headers[i];
        h.classList.remove('sorted');
        var arrow = h.querySelector('.sort-arrow');
        if (arrow) arrow.textContent = '';
      }
      var active = document.querySelector('.sortable[data-sort="' + sortField + '"]');
      if (active) {
        active.classList.add('sorted');
        var a = active.querySelector('.sort-arrow');
        if (a) a.textContent = sortDir === 1 ? ' ▲' : ' ▼';
      }
    }

    async function loadVideos(folder) {
      var req = ++loadVideosReq;
      videoTableBody.innerHTML = '<div class="loading-state">加载数据中...</div>';
      try {
        var url = '/api/manage/videos' + (folder ? '?folder=' + encodeURIComponent(folder) : '');
        var files = await api(url);
        if (req !== loadVideosReq) return;

        try { retentionConfig = await api('/api/manage/retention'); } catch(e) { retentionConfig = { folders:{}, files:{} }; }
        fileRetentionRules = retentionConfig.files || {};

        sortFiles(files);
        var totalSize = files.reduce(function(s, f) { return s + f.size; }, 0);
        videoCount.textContent = files.length + ' 个项目 · 总计 ' + formatSize(totalSize);
        if (!files.length) {
          videoTableBody.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
              <span>此目录为空</span>
            </div>`;
          return;
        }
        var html = '';
        for (var i = 0; i < files.length; i++) {
          var f = files[i];
          var remain = getRemainingInfo(f.path, f.folder, f.mtime);
          var rule = getRule(f.path, f.folder);
          var dateCell = remain
            ? '<span class="col-date ' + remain.cls + '" title="' + formatDate(f.mtime) + ' · 规则 ' + rule.days + ' 天 · 到期 ' + formatDate(rule.setAt + rule.days * 86400000) + '">' + remain.label + '</span>'
            : '<span class="col-date" title="' + formatDate(f.mtime) + '">' + formatDate(f.mtime) + '</span>';
          html += `
            <div class="table-row">
              <span class="col-name" title="${esc(f.name)}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><circle cx="12" cy="13" r="2"></circle><line x1="12" y1="15" x2="12" y2="18"></line></svg>
                ${esc(f.name)}
              </span>
              <span class="col-size">${formatSize(f.size)}</span>
              ${dateCell}
              <button class="btn-danger delete-btn" data-path="${esc(f.path)}">删除</button>
              <button class="retention-btn" data-path="${esc(f.path)}" data-name="${esc(f.name)}" title="单独设置清理">清理</button>
            </div>`;
        }
        videoTableBody.innerHTML = html;
        var btns = videoTableBody.querySelectorAll('.delete-btn');
        for (var k = 0; k < btns.length; k++) {
          btns[k].addEventListener('click', function(e) {
            e.stopPropagation(); deleteVideo(this.getAttribute('data-path'));
          });
        }
        var rbs = videoTableBody.querySelectorAll('.retention-btn');
        for (var k = 0; k < rbs.length; k++) {
          rbs[k].addEventListener('click', function(e) {
            e.stopPropagation();
            setFileRetention(this.getAttribute('data-path'), this.getAttribute('data-name'));
          });
        }
        updateSortHeaders();
        loadRetentionBadges();
      } catch (err) {
        videoTableBody.innerHTML = '<div class="empty-state" style="color:var(--danger)">加载失败: ' + esc(err.message) + '</div>';
        videoCount.textContent = '0 个项目 · 总计 0 B';
      }
    }

    videoFolderSelect.addEventListener('change', function(){
      if (populating) return; loadVideos(this.value);
    });
    loadVideos('');

    async function deleteVideo(filePath) {
      var name = filePath.split('/').pop();
      if (!confirm('危险操作: 确定要永久删除 "' + name + '" 吗？')) return;
      try {
        await api('/api/manage/video', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: filePath }) });
        toast('文件已删除'); loadVideos(videoFolderSelect.value);
      } catch (err) { toast('删除失败: ' + err.message, true); }
    }

    var modal = document.getElementById('retentionModal');
    var modalFileName = document.getElementById('modalFileName');
    var modalRetentionDays = document.getElementById('modalRetentionDays');
    var modalPendingPath = '';
    var modalPendingName = '';

    document.getElementById('modalCancel').addEventListener('click', function() {
      modal.style.display = 'none';
    });
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.style.display = 'none';
    });

    document.getElementById('modalConfirm').addEventListener('click', async function() {
      var days = parseInt(modalRetentionDays.value, 10);
      if (isNaN(days) || days < 0) { toast('请输入有效的天数', true); return; }
      modal.style.display = 'none';
      try {
        await api('/api/manage/retention', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'file', file: modalPendingPath, days: days })
        });
        toast(days === 0 ? '已移除清理规则' : '已设置 ' + days + ' 天清理规则');
        loadVideos(videoFolderSelect.value);
        loadRetention();
      } catch (err) { toast('设置失败: ' + err.message, true); }
    });

    document.getElementById('modalRemove').addEventListener('click', async function() {
      modal.style.display = 'none';
      try {
        await api('/api/manage/retention', {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'file', file: modalPendingPath, days: 0 })
        });
        toast('已移除清理规则');
        loadVideos(videoFolderSelect.value);
        loadRetention();
      } catch (err) { toast('移除失败: ' + err.message, true); }
    });

    function setFileRetention(filePath, fileName) {
      modalPendingPath = filePath;
      modalPendingName = fileName;
      modalFileName.textContent = fileName;
      var existing = fileRetentionRules[filePath];
      var existingDays = existing ? (typeof existing === 'number' ? existing : existing.days) : 0;
      modalRetentionDays.value = existingDays || 30;
      document.getElementById('modalRemove').style.display = existingDays ? '' : 'none';
      modal.style.display = 'flex';
      modalRetentionDays.focus();
      modalRetentionDays.select();
    }

    var fileRetentionRules = {};
    var retentionConfig = { folders: {}, files: {} };

    function getRule(filePath, folder) {
      if (retentionConfig.files && retentionConfig.files[filePath] !== undefined) {
        var r = retentionConfig.files[filePath];
        return typeof r === 'number' ? { days: r, setAt: 0 } : r;
      }
      if (retentionConfig.folders && folder) {
        var keys = Object.keys(retentionConfig.folders);
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (folder === key || folder.startsWith(key + '/') || folder.startsWith(key) || key.endsWith('/' + folder)) {
            var r = retentionConfig.folders[key];
            return typeof r === 'number' ? { days: r, setAt: 0 } : r;
          }
        }
        var fullPath = '/Users/yangyang/video/' + folder;
        if (retentionConfig.folders[fullPath] !== undefined) {
          var r2 = retentionConfig.folders[fullPath];
          return typeof r2 === 'number' ? { days: r2, setAt: 0 } : r2;
        }
      }
      return null;
    }

    function getRemainingInfo(filePath, folder, mtime) {
      var rule = getRule(filePath, folder);
      if (!rule || !rule.days || rule.days <= 0) return null;
      var deadline = (rule.setAt || mtime) + rule.days * 86400000;
      var remainingMs = deadline - Date.now();
      var remainingDays = Math.ceil(remainingMs / 86400000);
      var label;
      if (remainingDays <= 0) label = '待清理';
      else if (remainingDays === 1) label = '今日';
      else label = remainingDays + '天';
      var cls;
      if (remainingDays <= 0) cls = 'remain-expired';
      else if (remainingDays <= 1) cls = 'remain-today';
      else if (remainingDays <= 7) cls = 'remain-warn';
      else cls = 'remain-ok';
      return { label: label, cls: cls, remainingDays: remainingDays };
    }

    async function loadRetentionBadges() {
      try {
        var config = await api('/api/manage/retention');
        fileRetentionRules = config.files || {};
        var btns = videoTableBody.querySelectorAll('.retention-btn');
        for (var i = 0; i < btns.length; i++) {
          var path = btns[i].getAttribute('data-path');
          var hasRule = fileRetentionRules.hasOwnProperty(path);
          btns[i].classList.toggle('has-rule', hasRule);
          if (hasRule) {
            var frd = typeof fileRetentionRules[path] === 'number' ? fileRetentionRules[path] : fileRetentionRules[path].days;
            btns[i].textContent = frd + '天';
            btns[i].title = '点击修改（当前: ' + frd + ' 天）';
          } else {
            btns[i].textContent = '清理';
            btns[i].title = '单独设置清理';
          }
        }
      } catch {}
    }

    var policyList = document.getElementById('policyList');

    async function loadRetention() {
      policyList.innerHTML = '<div class="loading-state">加载中...</div>';
      try {
        var config = await api('/api/manage/retention');
        var folders = config.folders || {};
        var files = config.files || {};
        var fEntries = Object.keys(folders);
        var fileEntries = Object.keys(files);

        if (!fEntries.length && !fileEntries.length) {
          policyList.innerHTML = '<div class="empty-state" style="padding: 20px;">未配置任何自动清理规则</div>';
          return;
        }
        var html = '';
        for (var i = 0; i < fEntries.length; i++) {
          var fp = fEntries[i], rule = folders[fp];
          var days = typeof rule === 'number' ? rule : rule.days;
          var name = fp.replace(/^\/Users\/[^/]+\/video\//, '') || fp;
          html += `
            <div class="policy-item">
              <div class="policy-info">
                <div class="policy-name">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary); flex-shrink:0;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                  ${esc(name)}
                </div>
                <div class="policy-days">保留周期: ${days} 天（整个目录）</div>
              </div>
              <button class="btn-danger remove-btn" data-folder="${esc(fp)}">移除</button>
            </div>`;
        }
        for (var j = 0; j < fileEntries.length; j++) {
          var fpath = fileEntries[j], frule = files[fpath];
          var fdays = typeof frule === 'number' ? frule : frule.days;
          var fname = fpath.split('/').pop() || fpath;
          html += `
            <div class="policy-item">
              <div class="policy-info">
                <div class="policy-name">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#f59e0b; flex-shrink:0;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                  ${esc(fname)}
                </div>
                <div class="policy-days">保留周期: ${fdays} 天（单文件）</div>
              </div>
              <button class="btn-danger remove-file-btn" data-file="${esc(fpath)}">移除</button>
            </div>`;
        }
        policyList.innerHTML = html;
        var btns = policyList.querySelectorAll('.remove-btn');
        for (var k = 0; k < btns.length; k++) {
          btns[k].addEventListener('click', function() { removeRetention(this.getAttribute('data-folder')); });
        }
        var fbtns = policyList.querySelectorAll('.remove-file-btn');
        for (var k = 0; k < fbtns.length; k++) {
          fbtns[k].addEventListener('click', function() { removeFileRetention(this.getAttribute('data-file')); });
        }
      } catch (err) { policyList.innerHTML = '<div class="empty-state" style="color:var(--danger)">加载规则失败</div>'; }
    }
    loadRetention();

    document.getElementById('saveRetentionBtn').addEventListener('click', async function() {
      var folder = retentionFolderSelect.value, days = parseInt(document.getElementById('retentionDays').value, 10);
      if (!folder) return toast('请先选择目标目录', true);
      if (isNaN(days) || days < 0) return toast('请输入有效的天数', true);
      try {
        await api('/api/manage/retention', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: folder, days: days }) });
        toast('规则保存成功');
        document.getElementById('retentionDays').value = ''; retentionFolderSelect.value = '';
        loadRetention();
      } catch (err) { toast('保存失败: ' + err.message, true); }
    });

    async function removeFileRetention(filePath) {
      var name = filePath.split('/').pop();
      if (!confirm('确定要移除 "' + name + '" 的清理规则吗？')) return;
      try {
        await api('/api/manage/retention', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: 'file', file: filePath, days: 0 }) });
        toast('已移除');
        loadRetention(); loadVideos(videoFolderSelect.value);
      } catch (err) { toast('移除失败: ' + err.message, true); }
    }

    async function removeRetention(folderPath) {
      if (!confirm('确定要移除此目录的清理规则吗？')) return;
      try {
        await api('/api/manage/retention', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: folderPath, days: 0 }) });
        toast('规则已移除'); loadRetention();
      } catch (err) { toast('移除失败: ' + err.message, true); }
    }
  </script>

</body>
</html>
