<!DOCTYPE html>
<html lang="zh-CN" translate="no" class="notranslate">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频管理</title>
  <style>
    :root {
      /* 现代配色变量 */
      --primary: #6366f1; /* 靛蓝色 */
      --primary-hover: #4f46e5;
      --primary-light: #e0e7ff;
      --danger: #ef4444;
      --danger-bg: #fee2e2;
      --danger-hover: #fca5a5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius-lg: 16px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --font-family: 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.5;
      padding: 40px 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* 顶部头部 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title svg {
      width: 28px;
      height: 28px;
      color: var(--primary);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }

    .home-btn:hover {
      background: var(--bg);
      border-color: #cbd5e1;
    }

    /* 卡片布局 */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 28px;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* 表单元素 */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    select, input[type=number] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-main);
      background: var(--bg);
      transition: all 0.2s ease;
      font-family: inherit;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      padding-right: 40px;
      cursor: pointer;
    }

    .select-arrow {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-muted);
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--surface);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    /* 数据表格区域 */
    .table-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 12px;
    }

    .video-count {
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
      background: var(--primary-light);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .table-container {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--surface);
    }

    .table-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px 110px 80px;
      gap: 16px;
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .table-body {
      max-height: 400px;
      overflow-y: auto;
    }

    .table-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 100px 110px 80px;
      gap: 16px;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: #f8fafc; }

    .col-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-name svg { flex-shrink: 0; color: var(--text-muted); }
    .col-size, .col-date { font-size: 13px; color: var(--text-muted); }
    
    /* 按钮 */
    .btn-danger {
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--danger);
      background: var(--danger-bg);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
      justify-self: end;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
      color: #991b1b;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: var(--primary);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
      margin-top: 8px;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* 策略列表 */
    .policy-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .policy-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: box-shadow 0.2s;
    }

    .policy-item:hover {
      box-shadow: var(--shadow-md);
      border-color: #cbd5e1;
    }

    .policy-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .policy-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      word-break: break-all;
    }

    .policy-days {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* 状态提示 */
    .empty-state, .loading-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .empty-state svg { color: #cbd5e1; }

    /* Flex 布局辅助 */
    .row-group {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .table-header, .table-row {
        grid-template-columns: minmax(0, 1fr) 80px 70px;
      }
      .col-date { display: none; }
      .row-group { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="header-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.5" ry="2.5"></rect><line x1="2" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="22"></line></svg>
      <h1>媒体控制台</h1>
    </div>
    <button class="home-btn" onclick="location.href='/video.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      返回主页
    </button>
  </div>

  <div class="grid-container">
    
    <!-- 视频管理卡片 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">文件浏览器</div>
        <div class="card-desc">选择目录以查看和管理视频文件</div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <select id="videoFolderSelect"><option value="">加载中...</option></select>
          <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>

      <div class="table-toolbar">
        <div class="video-count" id="videoCount">0 个视频</div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <span>文件名称</span>
          <span>大小</span>
          <span class="col-date">修改日期</span>
          <span style="text-align: right;">操作</span>
        </div>
        <div class="table-body" id="videoTableBody">
          <div class="loading-state">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            等待选择文件夹
          </div>
        </div>
      </div>
    </div>

    <!-- 自动清理卡片 -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">自动清理规则</div>
        <div class="card-desc">配置目录的保留策略，系统将自动清理超期文件。</div>
      </div>

      <div class="row-group">
        <div class="form-group">
          <label class="form-label">目标目录</label>
          <div class="input-wrapper">
            <select id="retentionFolderSelect"><option value="">加载中...</option></select>
            <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">保留天数 (0=禁用)</label>
          <input type="number" id="retentionDays" min="0" placeholder="例如: 30">
        </div>
      </div>

      <button class="btn-primary" id="saveRetentionBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        保存规则
      </button>

      <div style="margin-top: 32px;">
        <label class="form-label" style="color: var(--text-muted); text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;">当前生效的规则</label>
        <div class="policy-list" id="policyList">
          <div class="loading-state">加载中...</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // 现代版 Toast 提示
    function toast(msg, isError) {
      var el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = `
        position: fixed; bottom: 32px; right: 32px;
        background: ${isError ? '#ef4444' : '#10b981'}; color: white;
        padding: 14px 24px; border-radius: 8px; z-index: 9999;
        font-size: 14px; font-weight: 500;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        transform: translateY(100px); opacity: 0;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      `;
      document.body.appendChild(el);
      requestAnimationFrame(() => { el.style.transform = 'translateY(0)'; el.style.opacity = '1'; });
      setTimeout(() => { 
        el.style.transform = 'translateY(20px)'; el.style.opacity = '0'; 
        setTimeout(() => el.remove(), 400); 
      }, 3000);
    }

    async function api(url, options) {
      var res = await fetch(url, options);
      var json = await res.json();
      if (json.code !== 0) throw new Error(json.message || '请求失败');
      return json.data;
    }

    function formatSize(bytes) {
      if (!bytes) return '0 B';
      var u = ['B','KB','MB','GB','TB'];
      var i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
    }

    function formatDate(ms) {
      var d = new Date(ms);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    var videoFolderSelect = document.getElementById('videoFolderSelect');
    var retentionFolderSelect = document.getElementById('retentionFolderSelect');
    var populating = false;

    async function loadFolders() {
      try {
        var folders = await api('/api/folders');
        populating = true;
        var h1 = '<option value="">查看全部视频</option>';
        var h2 = '<option value="" disabled selected>请选择要配置的目录</option>';
        for (var i = 0; i < folders.length; i++) {
          var val = esc(folders[i].path), name = esc(folders[i].name);
          h1 += '<option value="' + val + '">' + name + '</option>';
          h2 += '<option value="' + val + '">' + name + '</option>';
        }
        videoFolderSelect.innerHTML = h1; retentionFolderSelect.innerHTML = h2;
        populating = false;
      } catch (err) {
        populating = false;
        videoFolderSelect.innerHTML = '<option value="">加载失败</option>';
        retentionFolderSelect.innerHTML = '<option value="">加载失败</option>';
      }
    }
    loadFolders();

    var videoTableBody = document.getElementById('videoTableBody');
    var videoCount = document.getElementById('videoCount');
    var loadVideosReq = 0;

    async function loadVideos(folder) {
      var req = ++loadVideosReq;
      videoTableBody.innerHTML = '<div class="loading-state">加载数据中...</div>';
      try {
        var url = '/api/manage/videos' + (folder ? '?folder=' + encodeURIComponent(folder) : '');
        var files = await api(url);
        if (req !== loadVideosReq) return;
        var totalSize = files.reduce(function(s, f) { return s + f.size; }, 0);
        videoCount.textContent = files.length + ' 个项目 · 总计 ' + formatSize(totalSize);
        if (!files.length) {
          videoTableBody.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
              <span>此目录为空</span>
            </div>`;
          return;
        }
        var html = '';
        for (var i = 0; i < files.length; i++) {
          var f = files[i];
          html += `
            <div class="table-row">
              <span class="col-name" title="${esc(f.name)}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><circle cx="12" cy="13" r="2"></circle><line x1="12" y1="15" x2="12" y2="18"></line></svg>
                ${esc(f.name)}
              </span>
              <span class="col-size">${formatSize(f.size)}</span>
              <span class="col-date">${formatDate(f.mtime)}</span>
              <button class="btn-danger delete-btn" data-path="${esc(f.path)}">删除</button>
            </div>`;
        }
        videoTableBody.innerHTML = html;
        var btns = videoTableBody.querySelectorAll('.delete-btn');
        for (var k = 0; k < btns.length; k++) {
          btns[k].addEventListener('click', function(e) {
            e.stopPropagation(); deleteVideo(this.getAttribute('data-path'));
          });
        }
      } catch (err) {
        videoTableBody.innerHTML = '<div class="empty-state" style="color:var(--danger)">加载失败: ' + esc(err.message) + '</div>';
        videoCount.textContent = '0 个项目 · 总计 0 B';
      }
    }

    videoFolderSelect.addEventListener('change', function(){
      if (populating) return; loadVideos(this.value);
    });
    loadVideos('');

    async function deleteVideo(filePath) {
      var name = filePath.split('/').pop();
      if (!confirm('危险操作: 确定要永久删除 "' + name + '" 吗？')) return;
      try {
        await api('/api/manage/video', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path: filePath }) });
        toast('文件已删除'); loadVideos(videoFolderSelect.value);
      } catch (err) { toast('删除失败: ' + err.message, true); }
    }

    var policyList = document.getElementById('policyList');

    async function loadRetention() {
      policyList.innerHTML = '<div class="loading-state">加载中...</div>';
      try {
        var config = await api('/api/manage/retention');
        var folders = config.folders || {};
        var entries = Object.keys(folders);
        if (!entries.length) {
          policyList.innerHTML = '<div class="empty-state" style="padding: 20px;">未配置任何自动清理规则</div>';
          return;
        }
        var html = '';
        for (var i = 0; i < entries.length; i++) {
          var fp = entries[i], days = folders[fp];
          var name = fp.replace(/^\/Users\/[^/]+\/video\//, '') || fp;
          html += `
            <div class="policy-item">
              <div class="policy-info">
                <div class="policy-name">${esc(name)}</div>
                <div class="policy-days">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                  保留周期: ${days} 天
                </div>
              </div>
              <button class="btn-danger remove-btn" data-folder="${esc(fp)}">移除规则</button>
            </div>`;
        }
        policyList.innerHTML = html;
        var btns = policyList.querySelectorAll('.remove-btn');
        for (var k = 0; k < btns.length; k++) {
          btns[k].addEventListener('click', function() { removeRetention(this.getAttribute('data-folder')); });
        }
      } catch (err) { policyList.innerHTML = '<div class="empty-state" style="color:var(--danger)">加载规则失败</div>'; }
    }
    loadRetention();

    document.getElementById('saveRetentionBtn').addEventListener('click', async function() {
      var folder = retentionFolderSelect.value, days = parseInt(document.getElementById('retentionDays').value, 10);
      if (!folder) return toast('请先选择目标目录', true);
      if (isNaN(days) || days < 0) return toast('请输入有效的天数', true);
      try {
        await api('/api/manage/retention', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: folder, days: days }) });
        toast('规则保存成功');
        document.getElementById('retentionDays').value = ''; retentionFolderSelect.value = '';
        loadRetention();
      } catch (err) { toast('保存失败: ' + err.message, true); }
    });

    async function removeRetention(folderPath) {
      if (!confirm('确定要移除此目录的清理规则吗？')) return;
      try {
        await api('/api/manage/retention', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folder: folderPath, days: 0 }) });
        toast('规则已移除'); loadRetention();
      } catch (err) { toast('移除失败: ' + err.message, true); }
    }
  </script>
</body>
</html>
