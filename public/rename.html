<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剧集批量重命名工具</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      background: #2b2f3a;
      color: white;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 10px;
      align-items: center;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #ff6699;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    pre {
      background: black;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      margin-top: 20px;
    }

    .hint {
      margin-top: 8px;
      color: #aaa;
      font-size: 12px;
      line-height: 1.5;
    }

    .secondary-btn {
      margin-top: 0;
      width: 100%;
      background: #2b2f3a;
    }

    .card + .card {
      margin-top: 20px;
    }

    .status-bar-inline {
      margin-top: 12px;
      padding: 10px 14px;
      background: #2b2f3a;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      min-height: 20px;
    }

    .status-bar-inline .done { color: #4ade80; }
    .status-bar-inline .error { color: #f87171; }
    .status-bar-inline .running { color: #facc15; }

    .progress-wrap {
      margin-top: 8px;
      height: 6px;
      background: #2b2f3a;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
  </style>
</head>

<body>
  <div style="display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;">
    <h1 style="margin:0;">剧集批量重命名工具</h1>
    <button onclick="location.href='/video.html'" style="margin:0; width:auto; padding:8px 14px; font-size:14px; background:#2b2f3a; line-height:1;" title="主页">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9"/><path d="M5 10v11h14V10"/><path d="M9 21V13h6v8"/></svg>
    </button>
  </div>

  <div class="card">
    <label>本地视频文件夹路径</label>
    <div class="row">
      <input type="text" id="folderPath" placeholder="例如 /Users/yang/Downloads/长安的荔枝">
      <select id="folderSelect">
        <option value="">-- 加载中... --</option>
      </select>
    </div>
    <div class="hint" id="folderHint">从右侧下拉框选择服务器目录可自动填入路径，也可手动输入。</div>

    <label>B站任意剧集链接（ep链接）</label>
    <input type="text" id="biliUrl" placeholder="例如 https://www.bilibili.com/bangumi/play/ep473314">

    <button id="renameBtn">开始批量重命名</button>

    <pre id="result">等待操作...</pre>
  </div>

  <div class="card">
    <h2 style="margin:0 0 8px; font-size:18px;">爱奇艺批量重命名</h2>
    <label>本地视频文件夹路径</label>
    <input type="text" id="iqiyiFolderPath" placeholder="例如 /Users/yang/video/低智商犯罪" onchange="document.getElementById('iqiyiFolderSelect').value=''">
    <div class="hint">从右侧下拉框选择服务器目录可自动填入路径，也可手动输入。</div>

    <label>任意一集的 tvid（9-16位数字）</label>
    <input type="text" id="iqiyiTvid" placeholder="例如 103405000">

    <button id="iqiyiRenameBtn">开始批量重命名</button>
    <pre id="iqiyiResult">等待操作...</pre>
  </div>

  <div class="card">
    <h2 style="margin:0 0 8px; font-size:18px;">视频转换</h2>
    <label>视频文件路径</label>
    <div class="row">
      <input type="text" id="convertFilePath" placeholder="例如 /Users/yang/video/视频.mkv">
      <select id="convertFolderSelect">
        <option value="">-- 加载中... --</option>
      </select>
    </div>
    <div class="hint">从右侧下拉框选择视频文件自动填入路径。输出文件在同目录下，文件名加 _browser.mp4 后缀。</div>

    <button id="convertBtn">开始转换</button>
    <div class="status-bar-inline" id="convertStatus" style="display:none;"></div>
  </div>

  <script>
    const renameBtn = document.getElementById('renameBtn');
    const resultBox = document.getElementById('result');
    const folderPathInput = document.getElementById('folderPath');
    const folderSelect = document.getElementById('folderSelect');

    async function api(url, options) {
      const res = await fetch(url, options);
      const json = await res.json();
      if (json.code !== 0) throw new Error(json.message || '请求失败');
      return json.data;
    }

    async function loadFolders() {
      try {
        const folders = await api('/api/folders');
        folderSelect.innerHTML = '<option value=””>-- 请选择目录 --</option>';
        if (!folders || folders.length === 0) {
          folderSelect.innerHTML = '<option value=””>-- 无可用目录 --</option>';
          return;
        }
        folders.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.path;
          opt.textContent = f.name;
          folderSelect.appendChild(opt);
        });
      } catch (err) {
        console.error('获取文件夹列表失败:', err);
        folderSelect.innerHTML = '<option value=””>-- 加载失败 --</option>';
      }
    }

    folderSelect.addEventListener('change', () => {
      const dir = folderSelect.value;
      if (dir) folderPathInput.value = dir;
    });

    loadFolders();

    const convertBtn = document.getElementById('convertBtn');
    const convertFilePathInput = document.getElementById('convertFilePath');
    const convertFolderSelect = document.getElementById('convertFolderSelect');
    const convertStatus = document.getElementById('convertStatus');

    async function loadConvertFolders() {
      try {
        const files = await api('/api/video-files');
        convertFolderSelect.innerHTML = '<option value="">-- 请选择视频文件 --</option>';
        if (!files || files.length === 0) {
          convertFolderSelect.innerHTML = '<option value="">-- 无视频文件 --</option>';
          return;
        }
        files.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.path;
          opt.textContent = f.name;
          convertFolderSelect.appendChild(opt);
        });
      } catch (err) {
        convertFolderSelect.innerHTML = '<option value="">-- 加载失败 --</option>';
      }
    }

    convertFolderSelect.addEventListener('change', () => {
      const filePath = convertFolderSelect.value;
      if (filePath) convertFilePathInput.value = filePath;
    });

    loadConvertFolders();

    let pollingTimer = null;

    async function loadConvertHistory() {
      try {
        const history = await api('/api/convert/history');
        if (!history || history.length === 0) return;

        const last = history[0];
        if (last.status === 'running' || last.status === 'probing') {
          convertBtn.disabled = true;
          convertStatus.style.display = 'block';
          startPolling(last.id);
        } else if (last.status === 'interrupted') {
          convertStatus.style.display = 'block';
          convertFilePathInput.value = last.input || '';
          convertStatus.innerHTML = `<span class="error">上次转换中断（服务器重启），可重新提交: ${escapeHtml(last.input)}</span>`;
        } else if (last.status === 'done') {
          const elapsed = last.endTime ? Math.round((last.endTime - last.startTime) / 1000) : 0;
          convertStatus.style.display = 'block';
          convertStatus.innerHTML = `<span class="done">上次转换完成，耗时 ${formatTime(elapsed)}: ${escapeHtml(last.output)}</span>`;
        } else if (last.status === 'error') {
          convertStatus.style.display = 'block';
          convertStatus.innerHTML = `<span class="error">上次转换失败: ${escapeHtml(last.error || '未知错误')}</span>`;
        }
      } catch {}
    }

    function startPolling(taskId) {
      if (pollingTimer) clearInterval(pollingTimer);
      pollingTimer = setInterval(async () => {
        try {
          const st = await api(`/api/convert/status?id=${encodeURIComponent(taskId)}`);
          if (st.status === 'interrupted') {
            clearInterval(pollingTimer);
            convertFilePathInput.value = st.input || '';
            convertStatus.innerHTML = `<span class="error">转换已中断（服务器重启），可重新提交: ${escapeHtml(st.input)}</span>`;
            convertBtn.disabled = false;
          } else if (st.status === 'done') {
            clearInterval(pollingTimer);
            const elapsed = st.endTime ? Math.round((st.endTime - st.startTime) / 1000) : 0;
            convertStatus.innerHTML = `<span class="done">转换完成，耗时 ${formatTime(elapsed)}: ${escapeHtml(st.output)}</span>`;
            convertBtn.disabled = false;
          } else if (st.status === 'error') {
            clearInterval(pollingTimer);
            convertStatus.innerHTML = `<span class="error">转换失败: ${escapeHtml(st.error || '未知错误')}</span>`;
            convertBtn.disabled = false;
          } else if (st.status === 'probing') {
            convertStatus.innerHTML = '<span class="running">正在获取视频信息...</span>';
          } else {
            const cur = formatTime(st.progress || 0);
            const pct = st.duration ? Math.min(100, Math.round((st.progress / st.duration) * 100)) : 0;
            const total = formatTime(st.duration || 0);
            let eta = '';
            if (st.progress > 0 && st.duration) {
              const elapsed = (Date.now() - st.startTime) / 1000;
              const remaining = Math.max(0, Math.round((st.duration - st.progress) * elapsed / st.progress));
              eta = ` 剩余 ${formatTime(remaining)}`;
            }
            const bar = st.duration ? `<div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>` : '';
            convertStatus.innerHTML = `<span class="running">正在转换 ${pct}% (${cur} / ${total})${eta}</span>${bar}`;
          }
        } catch {
          clearInterval(pollingTimer);
          convertStatus.innerHTML = '<span class="error">状态查询失败</span>';
          convertBtn.disabled = false;
        }
      }, 1000);
    }

    loadConvertHistory();

    convertBtn.addEventListener('click', async () => {
      const filePath = convertFilePathInput.value.trim();
      if (!filePath) return alert('请输入视频文件路径');

      convertBtn.disabled = true;
      convertStatus.style.display = 'block';
      convertStatus.innerHTML = '<span class="running">正在获取视频信息...</span>';

      try {
        const data = await api('/api/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filePath })
        });

        startPolling(data.taskId);
      } catch (err) {
        convertStatus.innerHTML = `<span class="error">${escapeHtml(err.message)}</span>`;
        convertBtn.disabled = false;
      }
    });

    function formatTime(seconds) {
      if (!seconds || seconds <= 0) return '0秒';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${h}时${m}分${s}秒`;
      if (m > 0) return `${m}分${s}秒`;
      return `${s}秒`;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // ---- 爱奇艺批量重命名 ----
    const iqiyiRenameBtn = document.getElementById('iqiyiRenameBtn');
    const iqiyiResult = document.getElementById('iqiyiResult');
    const iqiyiFolderPath = document.getElementById('iqiyiFolderPath');
    const iqiyiTvid = document.getElementById('iqiyiTvid');

    // 文件夹下拉同步到爱奇艺输入框
    const iqiyiFolderSelect = document.createElement('select');
    iqiyiFolderSelect.style.cssText = 'margin-top:6px;width:100%;padding:10px;border:none;border-radius:8px;font-size:14px;background:#2b2f3a;color:#aaa;';
    iqiyiFolderSelect.innerHTML = '<option value="">-- 选择服务器目录 --</option>';
    iqiyiFolderPath.parentNode.insertBefore(iqiyiFolderSelect, iqiyiFolderPath.nextSibling);
    (async () => {
      try {
        const folders = await api('/api/folders');
        folders.forEach(f => { const o = document.createElement('option'); o.value = f.path; o.textContent = f.name; iqiyiFolderSelect.appendChild(o); });
      } catch {}
    })();
    iqiyiFolderSelect.addEventListener('change', async () => {
      const dir = iqiyiFolderSelect.value;
      if (!dir) return;
      iqiyiFolderPath.value = dir;
      // 扫描文件夹，提取 tvid 自动填入
      try {
        const files = await api(`/api/video-files?folder=${encodeURIComponent(dir)}`);
        for (const f of files) {
          const m = f.name.match(/\d{9,16}/);
          if (m) {
            iqiyiTvid.value = m[0];
            iqiyiTvid.style.background = '#1a3a1a';
            setTimeout(() => { iqiyiTvid.style.background = ''; }, 2000);
            break;
          }
        }
      } catch {}
    });

    iqiyiRenameBtn.addEventListener('click', async () => {
      const folderPath = iqiyiFolderPath.value.trim();
      const tvid = iqiyiTvid.value.trim();
      if (!folderPath || !tvid) return alert('请填写文件夹路径和 tvid');
      iqiyiResult.textContent = '处理中...';
      try {
        const data = await api('/api/rename/iqiyi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folderPath, tvid })
        });
        iqiyiResult.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        iqiyiResult.textContent = `错误：${err.message}`;
      }
    });

    renameBtn.addEventListener('click', async () => {
      const folderPath = folderPathInput.value.trim();
      const biliUrl = document.getElementById('biliUrl').value.trim();

      if (!folderPath || !biliUrl) {
        alert('请填写完整信息');
        return;
      }

      resultBox.textContent = '处理中，请稍候...';

      try {
        const data = await api('/api/rename', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            folderPath,
            biliUrl
          })
        });

        resultBox.textContent = JSON.stringify(data, null, 2);

      } catch (err) {
        resultBox.textContent = `错误：${err.message}`;
      }
    });
  </script>
</body>

</html>
