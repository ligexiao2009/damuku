<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站剧集批量重命名工具</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 10px;
      align-items: center;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #ff6699;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    pre {
      background: black;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      margin-top: 20px;
    }

    .hint {
      margin-top: 8px;
      color: #aaa;
      font-size: 12px;
      line-height: 1.5;
    }

    .secondary-btn {
      margin-top: 0;
      width: 100%;
      background: #2b2f3a;
    }
  </style>
</head>

<body>
  <h1>B站剧集批量重命名工具</h1>

  <div class="card">
    <label>本地视频文件夹路径（完整路径）</label>
    <div class="row">
      <input type="text" id="folderPath" placeholder="例如 /Users/yang/Downloads/长安的荔枝">
      <button type="button" id="pickFolderBtn" class="secondary-btn">选择文件夹</button>
    </div>
    <input type="file" id="folderPicker" webkitdirectory directory multiple hidden>
    <div class="hint" id="folderHint">浏览器安全限制下，无法自动读取你电脑里的真实完整路径；选择文件夹后这里只会帮你识别目录名，完整路径仍需手动确认。</div>

    <label>B站任意剧集链接（ep链接）</label>
    <input type="text" id="biliUrl" placeholder="例如 https://www.bilibili.com/bangumi/play/ep473314">

    <button id="renameBtn">开始批量重命名</button>

    <pre id="result">等待操作...</pre>
  </div>

  <script>
    const renameBtn = document.getElementById('renameBtn');
    const resultBox = document.getElementById('result');
    const folderPathInput = document.getElementById('folderPath');
    const pickFolderBtn = document.getElementById('pickFolderBtn');
    const folderPicker = document.getElementById('folderPicker');
    const folderHint = document.getElementById('folderHint');

    function inferFolderName(files) {
      const firstFile = files[0];
      if (!firstFile) return '';
      const relativePath = firstFile.webkitRelativePath || '';
      return relativePath.split('/')[0] || '';
    }

    pickFolderBtn.addEventListener('click', () => {
      folderPicker.click();
    });

    folderPicker.addEventListener('change', () => {
      const files = Array.from(folderPicker.files || []);
      const folderName = inferFolderName(files);

      if (!folderName) {
        folderHint.textContent = '没有从所选内容里识别到文件夹名，你仍然可以手动填写完整路径。';
        return;
      }

      if (!folderPathInput.value.trim()) {
        folderPathInput.value = folderName;
      }

      folderHint.textContent = `已选择文件夹“${folderName}”。浏览器仍然拿不到真实绝对路径，如果接口需要像 /Users/yang/... 这样的完整路径，请把输入框改成你本机的实际路径。`;
    });

    renameBtn.addEventListener('click', async () => {
      const folderPath = folderPathInput.value.trim();
      const biliUrl = document.getElementById('biliUrl').value.trim();

      if (!folderPath || !biliUrl) {
        alert('请填写完整信息');
        return;
      }

      resultBox.textContent = '处理中，请稍候...';

      try {
        const res = await fetch('/api/rename', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            folderPath,
            biliUrl
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || '处理失败');
        }

        resultBox.textContent = JSON.stringify(data, null, 2);

      } catch (err) {
        resultBox.textContent = `错误：${err.message}`;
      }
    });
  </script>
</body>

</html>
